<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checklists de Conduta – Hemodinâmica</title>
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419;
      --bg-card: #1a2129;
      --border: #2d3843;
      --text: #e6edf3;
      --text-muted: #8b9cad;
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.15);
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88, 166, 255, 0.08), transparent);
      color: var(--text);
      line-height: 1.5;
      padding: 0 1rem 3rem;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 1.5rem; }
    .logo-link { display: block; text-decoration: none; }
    .logo {
      max-width: 600px; height: auto; margin-bottom: 0.5rem;
      display: block; margin-left: auto; margin-right: auto;
      background: transparent;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.35rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    section h2 {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .placeholder { color: var(--text-muted); font-size: 0.95rem; }
    footer { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 2rem; opacity: 0.8; }
</style>
  <link rel="stylesheet" href="js/site-footer.css">
</head>
<body>
  <div class="wrap">
    <header>
      <a href="index.html" class="logo-link">
        <img src="Logo Hemodinâmica_regular.png" alt="Hemodinâmica" class="logo">
      </a>
      <h1>Checklists de Conduta</h1>
      <p class="subtitle">Protocolos e guias de conduta · Anest-Review</p>
    </header>

    <section>
      <h2>Checklists</h2>
      <p class="placeholder">Conteúdo em construção. Aqui você poderá acessar checklists de conduta para apoio à prática clínica.</p>
    </section>

    <footer class="footer-buttons"></footer>
  </div>
  <script src="js/site-footer.js"></script>
</body>
</html>
