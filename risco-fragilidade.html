<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fragilidade (Fenótipo de Fried) – Risco pré-operatório</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419; --bg-card: #1a2129; --bg-input: #252d36; --border: #2d3843;
      --text: #e6edf3; --text-muted: #8b9cad; --accent: #58a6ff; --accent-soft: rgba(88, 166, 255, 0.15);
    }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh; background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88, 166, 255, 0.08), transparent);
      color: var(--text); line-height: 1.5; padding: 0rem 1rem 3rem; }
    .wrap { max-width: 520px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 0.75rem; }
    .logo-link { display: block; text-decoration: none; }
    .logo { max-width: 600px; height: auto; margin-bottom: -2.5rem; display: block; margin-left: auto; margin-right: auto; background: transparent; transform: translateX(-3.2rem); clip-path: inset(0 0 25 0); }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.35rem 1.5rem; margin-bottom: 1.25rem; }
    section h2 { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #ffd139; margin-bottom: 0.4rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); text-align: center; }
    .check-item { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.85rem; text-align: left; }
    .check-item input { margin-top: 0.25rem; flex-shrink: 0; width: 1.15rem; height: 1.15rem; accent-color: var(--accent); cursor: pointer; }
    .check-item label { font-size: 0.95rem; color: var(--text); line-height: 1.45; cursor: pointer; }
    .fried-result { text-align: center; padding: 1rem; background: var(--bg-input); border-radius: 8px; margin-top: 0.5rem; }
    .fried-score { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .fried-risk { font-size: 0.95rem; color: var(--text-muted); margin-top: 0.35rem; }
    footer { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 0; opacity: 0.8; }
@media (max-width: 768px) { .logo { min-width: 240px; max-width: min(600px, calc(100vw - 2rem)); transform: translateX(0); } }
  </style>
  <link rel="stylesheet" href="js/site-footer.css">
</head>
<body>
  <div class="wrap">
    <header>
      <a href="https://grupomedreview.com.br/anestreview/hemodinamica/?utm_source=instagram&utm_medium=social&utm_campaign=anestreview_hemodinamica_ongoing&utm_term=linkbio&utm_content" target="_blank" rel="noopener noreferrer" class="logo-link"><img src="Logo Hemodinâmica_regular.png" alt="Hemodinâmica" class="logo"></a>
      <h1>Fragilidade (Fenótipo de Fried)</h1>
      <p class="subtitle">Risco pré-operatório · Avaliação de fragilidade</p>
    </header>
    <section>
      <h2>Critérios do fenótipo de Fried</h2>
      <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; text-align: left;">Marque cada critério presente (1 ponto por item).</p>
      <div class="check-item">
        <input type="checkbox" id="f1" aria-label="Perda de peso">
        <label for="f1">Perda de peso não intencional (≥4,5 kg ou ≥5% do peso no último ano)</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="f2" aria-label="Fraqueza">
        <label for="f2">Fraqueza (força de preensão reduzida)</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="f3" aria-label="Lentidão">
        <label for="f3">Lentidão (velocidade da marcha reduzida)</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="f4" aria-label="Exaustão">
        <label for="f4">Exaustão autorreferida</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="f5" aria-label="Baixa atividade física">
        <label for="f5">Baixa atividade física</label>
      </div>
    </section>
    <section>
      <h2>Classificação</h2>
      <div class="fried-result">
        <p class="fried-score" id="fried-score">Pontuação: 0</p>
        <p class="fried-risk" id="fried-risk">Robusto</p>
      </div>
    </section>
    <script>
      var inputs = document.querySelectorAll('.check-item input');
      var scoreEl = document.getElementById('fried-score');
      var riskEl = document.getElementById('fried-risk');
      function update() {
        var n = 0;
        inputs.forEach(function(cb) { if (cb.checked) n++; });
        scoreEl.textContent = 'Pontuação: ' + n;
        riskEl.textContent = n === 0 ? 'Robusto' : (n <= 2 ? 'Pré-frágil' : 'Frágil');
      }
      inputs.forEach(function(cb) { cb.addEventListener('change', update); });
    </script>
    <footer class="footer-buttons"></footer>
  </div>
  <script src="analytics.js"></script>
  <script src="js/site-footer.js"></script>
</body>
</html>
